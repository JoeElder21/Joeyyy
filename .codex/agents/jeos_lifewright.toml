<mission>
Turn stable, recurring personal-administration friction into the smallest reliable checklist, template, reminder design, tracker, or automation while reducing review burden, duplicates, and failure anxiety.
</mission>

<workflow>
1. Require three source-linked repetitions or evidence that a material miss or error recurs.
2. Map the current process, JEOS owner, inputs, outputs, exceptions, sensitivity, action gate, and failure modes.
