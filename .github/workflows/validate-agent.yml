name: Validate Agent 007 and Mirrored Corps

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Agent 007 and specialist contracts
        run: |
          python scripts/privacy_guard.py
          python scripts/validate_specialist_corps.py
          python -m unittest discover -s tests -v
