version = "2.1.0"
brain = "JEOS"
owner = "Agent 007"
namespace_prefix = "JEOS::"
write_target_prefix = "JEOS/"
roundtable_namespace = "JEOS::Roundtable"
roundtable_write_target = "JEOS/Roundtable"
private_data_runtime_only = true
roster = ["jeos_life_architect", "jeos_momentum_engine", "jeos_energy_director", "jeos_reflection_forge", "jeos_lifestyle_systems_builder"]

[routing]
resolution_order = ["brain_boundary", "explicit_agent", "canonical_target_owner", "private_constraint_profile", "most_specific_intent", "cadence_route", "agent_007_fallback"]
lower_precedence_wins = true
ambiguous_policy = "Life sets outcomes, Momentum creates actions, Energy constrains capacity and placement, Reflection extracts learning, Systems enters only after stable recurring friction; Agent 007 integrates."

[agents.jeos_life_architect]
class_id = "strategy"
roster_id = "JEOS-14"
status = "shadow"
native_file = ".codex/agents/jeos_life_architect.toml"
memory_namespace = "JEOS::Life-Architecture::jeos_life_architect"
write_targets = ["JEOS/Life-Architecture", "JEOS/Personal-Decision-Log", "JEOS/Commitment-Radar", "JEOS/Weekly-Life-Plan", "JEOS/Monthly-Life-Review"]
triggers = ["personal strategy", "weekly life plan", "goal alignment", "routine design", "commitment radar"]
outputs = ["life-domain map", "weekly plan", "priority stack", "commitment radar"]
responsibility = "Personal outcomes, priorities, and daily or weekly anchors."
routine_time_budget = "weekly review <= 10 minutes"
modes = ["life_direction", "weekly_plan", "monthly_review", "commitment_radar", "relationship_family"]
artifact_types = ["life_plan", "commitment_radar", "monthly_life_review"]
private_constraint_profiles = ["finance_limit:life_planning", "schedule_limit:life_planning", "accessibility:life_planning", "support_need:relationship_support"]
active_writer_eligible = true
connector_policy = "packet_only_no_direct_connectors"

[agents.jeos_momentum_engine]
class_id = "opportunity_momentum"
roster_id = "JEOS-15"
status = "shadow"
native_file = ".codex/agents/jeos_momentum_engine.toml"
memory_namespace = "JEOS::Momentum-Queue::jeos_momentum_engine"
write_targets = ["JEOS/Momentum-Queue", "JEOS/Habit-Loops", "JEOS/Study-Repetition", "JEOS/Completion-Evidence"]
triggers = ["daily action", "habit", "procrastination", "backlog", "restart", "study practice"]
outputs = ["activation queue", "next-action plan", "habit protocol", "study repetition update"]
responsibility = "Personal next actions, activation queue, habit loops, and study repetition."
routine_time_budget = "daily queue preparation <= 3 minutes"
modes = ["daily_activation", "habit_recovery", "study_retrieval"]
artifact_types = ["activation_queue", "habit_protocol", "study_repetition"]
private_constraint_profiles = ["health_limit:activation_accommodation", "schedule_limit:activation_accommodation", "accessibility:activation_accommodation", "support_need:activation_accommodation", "accessibility:study_accommodation"]
active_writer_eligible = true
connector_policy = "packet_only_no_direct_connectors"

[agents.jeos_energy_director]
class_id = "execution_capacity"
roster_id = "JEOS-16"
status = "shadow"
native_file = ".codex/agents/jeos_energy_director.toml"
memory_namespace = "JEOS::Energy-Capacity::jeos_energy_director"
write_targets = ["JEOS/Energy-Capacity", "JEOS/Recovery-Windows", "JEOS/Peak-Window-Map", "JEOS/Schedule-Constraints"]
triggers = ["capacity", "energy", "overload", "recovery", "peak window", "schedule feasibility"]
outputs = ["capacity map", "peak-window map", "energy-leak finding", "one adjustment"]
responsibility = "Personal capacity constraints and optional task placement."
routine_time_budget = "daily capacity pass <= 2 minutes"
modes = ["daily_capacity", "weekly_load", "recovery_adjustment"]
artifact_types = ["capacity_map", "schedule_adjustment", "weekly_load_review"]
private_constraint_profiles = ["health_limit:capacity_only", "schedule_limit:capacity_only", "accessibility:capacity_only", "support_need:capacity_only"]
active_writer_eligible = true
connector_policy = "packet_only_no_direct_connectors"

[agents.jeos_reflection_forge]
class_id = "intelligence_reflection"
roster_id = "JEOS-17"
status = "shadow"
native_file = ".codex/agents/jeos_reflection_forge.toml"
memory_namespace = "JEOS::Reflection-Ledger::jeos_reflection_forge"
write_targets = ["JEOS/Reflection-Ledger", "JEOS/Pattern-Hypotheses", "JEOS/Lessons-and-Rules", "JEOS/Growth-Experiments"]
triggers = ["weekly review", "journal", "voice note", "pattern", "faith reflection", "lesson"]
outputs = ["evidence-labeled reflection", "pattern hypothesis", "lesson", "growth experiment"]
responsibility = "Evidence-labeled lived learning, faith reflection, and growth experiments."
routine_time_budget = "weekly reflection or examen <= 10 minutes"
modes = ["weekly_reflection", "pattern_hypothesis", "faith_examen", "growth_experiment"]
artifact_types = ["reflection_synthesis", "growth_experiment", "faith_examen"]
private_constraint_profiles = ["support_need:reflection_accommodation", "accessibility:reflection_accommodation"]
active_writer_eligible = true
connector_policy = "packet_only_no_direct_connectors"

[agents.jeos_lifestyle_systems_builder]
class_id = "systems_automation"
roster_id = "JEOS-18"
status = "shadow"
native_file = ".codex/agents/jeos_lifestyle_systems_builder.toml"
memory_namespace = "JEOS::Lifestyle-Systems-Registry::jeos_lifestyle_systems_builder"
write_targets = ["JEOS/Lifestyle-Systems-Registry", "JEOS/Life-Admin-Automations", "JEOS/Checklist-Library", "JEOS/Maintenance-and-Renewal-Map"]
triggers = ["personal admin", "errand", "maintenance", "travel", "renewal", "subscription", "bill", "budget admin", "checklist", "automation"]
outputs = ["process map", "net-value score", "life-system design", "duplicate controls", "rollout and rollback plan"]
responsibility = "Stable recurring personal-administration systems and automation."
modes = ["life_admin_system", "renewal_maintenance", "finance_admin", "travel_errand", "system_value_review"]
artifact_types = ["life_system_design", "admin_control_plan", "system_value_review"]
private_constraint_profiles = ["finance_limit:financial_admin", "schedule_limit:life_admin", "accessibility:life_admin", "support_need:life_admin", "recurring_admin:life_admin", "renewal_schedule:life_admin"]
routine_time_budget = "monthly maintenance and value review <= 15 minutes"
active_writer_eligible = true
connector_policy = "packet_only_no_direct_connectors"

[[routes]]
route_id = "jeos.strategy"
precedence = 50
cadences = ["weekly", "monthly"]
intent = "personal direction goals routines commitments weekly monthly planning"
agent = "jeos_life_architect"
entry_condition = "Use to choose outcomes, priorities, and anchors; do not build the action queue."

[[routes]]
route_id = "jeos.momentum"
precedence = 30
cadences = ["daily", "weekly", "monthly"]
intent = "actions habits procrastination backlog study follow-through restart"
agent = "jeos_momentum_engine"
entry_condition = "Use after priorities are known; create next actions and restart rules."

[[routes]]
route_id = "jeos.energy"
precedence = 10
cadences = ["daily", "weekly", "monthly"]
intent = "time energy overload recovery bandwidth peak windows"
agent = "jeos_energy_director"
entry_condition = "Use only for capacity constraints and optional placement, not priorities."

[[routes]]
route_id = "jeos.reflection"
precedence = 40
cadences = ["weekly", "monthly"]
intent = "journal notes screenshots voice reflection patterns faith lessons"
agent = "jeos_reflection_forge"
entry_condition = "Use when dated lived evidence or faith reflection is the controlling input."

[[routes]]
route_id = "jeos.systems"
precedence = 20
cadences = ["weekly", "monthly"]
intent = "errands maintenance travel renewals subscriptions bills budget personal admin checklist automation"
agent = "jeos_lifestyle_systems_builder"
entry_condition = "Use only after stable recurring friction or material repeat error is evidenced."

[[cadence_routes]]
cadence = "daily"
order = ["jeos_life_architect", "jeos_energy_director", "jeos_momentum_engine"]
integrator = "apex_chief_of_staff"

[[cadence_routes]]
cadence = "weekly"
order = ["jeos_reflection_forge", "jeos_energy_director", "jeos_life_architect", "jeos_momentum_engine", "jeos_lifestyle_systems_builder"]
integrator = "apex_chief_of_staff"

[[cadence_routes]]
cadence = "monthly"
order = ["jeos_reflection_forge", "jeos_energy_director", "jeos_lifestyle_systems_builder", "jeos_life_architect", "jeos_momentum_engine"]
integrator = "apex_chief_of_staff"

[[challenge_pairs]]
agents = ["jeos_life_architect", "jeos_reflection_forge"]
purpose = "Intended direction versus a reflection synthesis dated within seven days; the synthesis may cite older longitudinal observations."

[[challenge_pairs]]
agents = ["jeos_momentum_engine", "jeos_energy_director"]
purpose = "Execution pressure versus sustainable capacity; use same-day evidence for a daily plan."

[[challenge_pairs]]
agents = ["jeos_momentum_engine", "jeos_lifestyle_systems_builder"]
purpose = "Prove stable repetition before automation."

[[challenge_pairs]]
agents = ["jeos_life_architect", "jeos_momentum_engine", "jeos_energy_director"]
purpose = "Direction, activation, and feasible placement; Agent 007 alone integrates the canonical plan."

[[challenge_pairs]]
agents = ["jeos_reflection_forge", "jeos_energy_director"]
purpose = "Reflection burden and experiment design versus current capacity."

[[challenge_pairs]]
agents = ["jeos_reflection_forge", "jeos_lifestyle_systems_builder"]
purpose = "Turn only repeated, evidenced personal friction into a maintained system."

[[challenge_pairs]]
agents = ["jeos_energy_director", "jeos_lifestyle_systems_builder"]
purpose = "System maintenance burden versus available capacity."
