# Dream-team charter modes — registered 2026-07-24 on Joe's direct instruction,
# refined the same day: dream-team roles are MODES of the existing v2.1
# mirrored corps, not separate registered agents. The corps stays ten
# specialists plus Agent 007.
#
# Joe's roster names 42 APEX and 5 JEOS roles (the JEOS list arrived truncated
# after #5; the remainder registers when Joe supplies it). Seven names are the
# v2.1 specialists themselves. The other forty are charter modes below, each
# owned by the specialist of its class. A charter mode extends the owning
# specialist's remit for mission staffing; it is NOT a v2.1 contract mode —
# packet-bound contract modes stay exactly as defined in brains/*/agents.toml,
# and a charter mode is promoted into a contract mode (with typed packets and
# acceptance tests) only through the normal acceptance process. Charter modes
# carry no write targets, connectors, or routes of their own.

version = "2.0.0"
authorized_by = "Joe Elder, 2026-07-24 directive (roles-as-modes refinement)"
kind = "charter_mode"
valid_owner_classes = [
    "strategy",
    "opportunity_momentum",
    "execution_capacity",
    "intelligence_reflection",
    "systems_automation",
]

