# Dream-team corps expansion — registered 2026-07-24 on Joe's direct instruction
# ("YOLO", overriding the prior smallest-team doctrine; AGENTS.md amended the same day).
#
# Joe's roster names 42 APEX and 5 JEOS agents (the JEOS list arrived truncated
# after #5; the remainder registers when Joe supplies it). Ten of the named
# agents are the existing v2.1 mirrored corps and stay governed exactly as
# before. The other forty register here at candidate stage: named, chartered,
# brain-locked, and mentored by one of the five mirrored classes until each is
# promoted through the normal lifecycle (candidate -> shadow -> active) with a
# native definition and acceptance tests of its own. Candidate agents hold no
# write targets, no connectors, and no routes; the mentor class's v2.1
# specialist speaks for the charter until promotion.

