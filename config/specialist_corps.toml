version = "2.0.0"
deployed_on = "2026-07-23"
rollback_parent = "4465ee9dd728f9ab0a8a9d13791f1f65523a4b3c"
apex_brain_manifest = "brains/apex/agents.toml"
jeos_brain_manifest = "brains/jeos/agents.toml"
apex_roster = ["apex_war_architect", "apex_deal_engine", "apex_delivery_commander", "apex_intelligence_forge", "apex_systems_blacksmith"]
jeos_roster = ["jeos_life_architect", "jeos_momentum_engine", "jeos_energy_director", "jeos_reflection_forge", "jeos_lifestyle_systems_builder"]

[governance]
sole_cross_brain_agent = "apex_chief_of_staff"
default_specialist_sandbox = "read-only"
designated_executor = "apex_chief_of_staff"
communication_mode = "live Agent 007 handoffs plus separate brain-private append-only roundtables"
repository_visibility = "public"
private_context_policy = "Retrieve minimum authorized context at runtime; never commit private APEX or JEOS source data."
continuous_runtime_claim = false
writer_lease_required = true
readback_required = true
packet_guard = "scripts/packet_guard.py"
mutation_result_schema = "schemas/mutation_result.schema.json"
brain_private_constraint_schema = "schemas/brain_private_constraint_packet.schema.json"
single_writer_scope = "owner brain + write target + canonical resource across all missions"
apex_roundtable_write_target = "APEX/Roundtable"
jeos_roundtable_write_target = "JEOS/Roundtable"

[lifecycle]
stages = ["candidate", "shadow", "active", "value-proven", "restricted", "deprecated", "retired"]
deployed_stage = "shadow"
active_gate = "Static contract tests plus one controlled real mission with evidence and readback."
value_gate = "Observed net value after review, correction, maintenance, and failure burden."

[mirrored_classes.strategy]
apex = "apex_war_architect"
jeos = "jeos_life_architect"

[mirrored_classes.opportunity_momentum]
